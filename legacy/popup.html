<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Send to NotebookLM</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="hero__eyebrow" data-i18n="hero_eyebrow">Notebook Capture</div>
        <div class="hero__title-row">
          <img class="hero__icon" src="assets/icon48.png" alt="" />
          <div>
            <h1 data-i18n="hero_title">Send to NotebookLM</h1>
            <p data-i18n="hero_subtitle">Current tab, cleaner context, fewer clicks.</p>
          </div>
          <button id="settingsToggle" class="settings-toggle" type="button" title="Settings">⚙️</button>
        </div>

        <div id="settingsPanel" class="settings-panel hidden">
          <h3 class="settings-title" data-i18n="settings_title">Settings</h3>
          <div class="settings-row">
            <label for="languageSelect" data-i18n="language_label">Language (Language)</label>
            <select id="languageSelect">
              <option value="zh" data-i18n="lang_zh">简体中文</option>
              <option value="en" data-i18n="lang_en">English</option>
            </select>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="card__header">
          <span class="card__label" data-i18n="card_label_current">Current page</span>
          <div class="header-actions">
            <button id="openPageBtn" class="ghost-button" type="button" data-i18n="btn_open">Open</button>
            <button id="quickAuthorizeBtn" class="ghost-button hidden" type="button" data-i18n="btn_authorize">Authorize</button>
          </div>
        </div>
        <div id="modeBadge" class="mode-badge hidden"></div>
        <h2 id="pageTitle" class="page-title" data-i18n="page_title_loading">Loading…</h2>
        <p id="pageMeta" class="page-meta"></p>
        <p id="pageDescription" class="page-description"></p>
        <div id="selectionWrap" class="selection hidden">
          <div class="selection__label" data-i18n="selection_label">Selected text</div>
          <p id="selectedText" class="selection__text"></p>
        </div>
      </section>

      <section id="targetCard" class="card">
        <div class="card__header">
          <span class="card__label" data-i18n="card_label_target">Target notebook</span>
          <button id="refreshBtn" class="ghost-button" type="button" data-i18n="btn_refresh">Refresh</button>
        </div>

        <label id="notebookField" class="field">
          <span data-i18n="label_choose_notebook">Choose notebook</span>
          <select id="notebookSelect"></select>
        </label>

        <div class="actions-row">
          <button id="createNotebookBtn" class="secondary-button" type="button" data-i18n="btn_new_notebook">New notebook</button>
          <button id="openNotebookLmBtn" class="ghost-button" type="button" data-i18n="btn_authorize">Authorize</button>
        </div>
      </section>

      <section id="arxivExistingCard" class="card hidden">
        <div class="card__header">
          <span class="card__label" data-i18n="card_label_existing">Add to Existing</span>
          <button id="toggleExistingBtn" class="ghost-button" type="button" data-i18n="btn_show">Show</button>
        </div>

        <div id="existingNotebookPanel" class="hidden">
          <label class="field">
            <span data-i18n="label_choose_notebook">Choose notebook</span>
            <select id="arxivNotebookSelect"></select>
          </label>

          <div class="actions-row compact-actions">
            <button id="arxivRefreshBtn" class="ghost-button" type="button" data-i18n="btn_refresh">Refresh</button>
            <button id="addToExistingBtn" class="secondary-button" type="button" data-i18n="btn_add">Add</button>
          </div>
        </div>
      </section>

      <section class="card accent-card">
        <div class="send-panel">
          <div class="send-copy">
            <div id="sendLabel" class="card__label" data-i18n="label_send_ready">Ready to send</div>
            <p id="sendHint" class="send-hint" data-i18n="hint_send_url">Imports the current page URL into the selected NotebookLM notebook.</p>
          </div>
          <button id="sendBtn" class="primary-button" type="button" data-i18n="btn_send_page">Send page</button>
        </div>
      </section>

      <p id="status" class="status" aria-live="polite"></p>
    </main>

    <script src="i18n.js"></script>
    <script type="module" src="popup.js"></script>
  </body>
  </html>
