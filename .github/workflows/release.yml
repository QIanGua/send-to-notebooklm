name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build & Zip
        run: bun run zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: .output/*-chrome.zip
          generate_release_notes: true
          draft: false
          prerelease: false
